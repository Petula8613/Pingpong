<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingpong Turnaj</title>
    <style>
        body {
            margin: 0;
            background: #0a0e14;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .loader {
            text-align: center;
            color: #00e5a0;
            font-family: sans-serif;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2d3d;
            border-top-color: #00e5a0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <div>Načítám…</div>
    </div>
    <script>
        fetch("/api/config")
            .then(r => r.json())
            .then(cfg => {
                const nyni = Date.now();
                const turnaj = new Date(cfg.datum_turnaje).getTime();
                if (nyni >= turnaj) {
                    window.location.replace("/turnaj.html");
                } else {
                    window.location.replace("/registrace.html");
                }
            })
            .catch(() => {
                window.location.replace("/registrace.html");
            });
    </script>
</body>

</html>
